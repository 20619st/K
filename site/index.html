<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>2048</h1>
    <div class="score-container">
      <div class="score-box">
        <span class="score-label">分數</span>
        <span id="score-display">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">最高分</span>
        <span id="best-score-display">0</span>
      </div>
    </div>
    <button id="restart-btn">重新開始</button>
  </header>

  <main>
    <div id="message-overlay" class="message-overlay hidden">
      <p id="message-text"></p>
      <div class="overlay-buttons">
        <button id="continue-btn">繼續遊戲</button>
        <button id="overlay-restart-btn">重新開始</button>
      </div>
    </div>

    <div id="game-board">
      <div class="cell" data-row="0" data-col="0"></div>
      <div class="cell" data-row="0" data-col="1"></div>
      <div class="cell" data-row="0" data-col="2"></div>
      <div class="cell" data-row="0" data-col="3"></div>
      <div class="cell" data-row="1" data-col="0"></div>
      <div class="cell" data-row="1" data-col="1"></div>
      <div class="cell" data-row="1" data-col="2"></div>
      <div class="cell" data-row="1" data-col="3"></div>
      <div class="cell" data-row="2" data-col="0"></div>
      <div class="cell" data-row="2" data-col="1"></div>
      <div class="cell" data-row="2" data-col="2"></div>
      <div class="cell" data-row="2" data-col="3"></div>
      <div class="cell" data-row="3" data-col="0"></div>
      <div class="cell" data-row="3" data-col="1"></div>
      <div class="cell" data-row="3" data-col="2"></div>
      <div class="cell" data-row="3" data-col="3"></div>
    </div>
  </main>

  <script type="module" src="game.js"></script>
</body>
</html>
